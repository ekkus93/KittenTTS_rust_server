services:
  kittentts-server-rs:
    image: kittentts-server-rs:latest
    container_name: kittentts-server-rs
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      additional_contexts:
        kitten_tts_rs: ../kitten_tts_rs
      args:
        ONNXRUNTIME_VERSION: "1.24.2"
    restart: unless-stopped
    ports:
      - "127.0.0.1:8008:8008"
    environment:
      HF_HOME: /home/elkitten/.cache/huggingface
      KITTENTTS_SERVER_HOST: 0.0.0.0
      KITTENTTS_SERVER_PORT: 8008
      RUST_LOG: info
      # Set this when you want to mount a host-managed model directory instead of
      # using the Hugging Face cache inside the container.
      # KITTENTTS_SERVER_MODEL_DIR: /app/models/kitten-tts-nano
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./config:/app/config:ro
      - kittentts-rs-hf-cache:/home/elkitten/.cache/huggingface
      # Uncomment this when using a host-managed model directory.
      # - ./models:/app/models:ro

volumes:
  kittentts-rs-hf-cache: